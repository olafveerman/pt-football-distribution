<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liga Portugal — Club Map</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="map"></div>

    <div id="panel">
      <div class="panel-header">
        <h1>Liga Portugal</h1>
        <p class="panel-subtitle">Club Geographic Distribution</p>
      </div>

      <div class="panel-section">
        <span class="panel-label">Season</span>
        <select id="season-select">
          <option value="2025-26">2025–26</option>
          <option value="2024-25">2024–25</option>
          <option value="2023-24">2023–24</option>
          <option value="2022-23">2022–23</option>
          <option value="2021-22">2021–22</option>
          <option value="2020-21">2020–21</option>
          <option value="2019-20">2019–20</option>
          <option value="2018-19">2018–19</option>
          <option value="2017-18">2017–18</option>
          <option value="2016-17">2016–17</option>
          <option value="2015-16">2015–16</option>
          <option value="2014-15">2014–15</option>
          <option value="2013-14">2013–14</option>
          <option value="2012-13">2012–13</option>
          <option value="2011-12">2011–12</option>
          <option value="2010-11">2010–11</option>
          <option value="2009-10">2009–10</option>
          <option value="2008-09">2008–09</option>
          <option value="2007-08">2007–08</option>
          <option value="2006-07">2006–07</option>
          <option value="2005-06">2005–06</option>
          <option value="2004-05">2004–05</option>
          <option value="2003-04">2003–04</option>
          <option value="2002-03">2002–03</option>
          <option value="2001-02">2001–02</option>
          <option value="2000-01">2000–01</option>
        </select>
      </div>

      <div class="panel-section">
        <span class="panel-label">Leagues</span>
        <div class="league-filters">
          <label class="league-filter">
            <input type="checkbox" data-league="liga-1" checked />
            <span class="league-dot" style="background:#E63946"></span>
            <span class="league-name">Liga Portugal 1</span>
            <span class="league-count" id="count-liga-1"></span>
          </label>
          <label class="league-filter">
            <input type="checkbox" data-league="liga-2" checked />
            <span class="league-dot" style="background:#457B9D"></span>
            <span class="league-name">Liga Portugal 2</span>
            <span class="league-count" id="count-liga-2"></span>
          </label>
          <label class="league-filter">
            <input type="checkbox" data-league="liga-3" checked />
            <span class="league-dot" style="background:#2A9D8F"></span>
            <span class="league-name">Liga Portugal 3</span>
            <span class="league-count" id="count-liga-3"></span>
          </label>
        </div>
      </div>

      <div class="panel-section">
        <span class="panel-label">Overlays</span>
        <div class="league-filters">
          <label class="league-filter">
            <input type="checkbox" id="toggle-heatmap" />
            <span class="league-dot heatmap-dot"></span>
            <span class="league-name">Density heatmap</span>
          </label>
        </div>
      </div>

      <p class="panel-note">
        Liga 2 &amp; 3 rosters are approximate — verify before publishing.
      </p>
    </div>

    <div id="insets">
      <div class="inset-wrapper">
        <div id="inset-madeira" class="inset-map"></div>
        <span class="inset-label">Madeira</span>
      </div>
      <div class="inset-wrapper">
        <div id="inset-azores" class="inset-map"></div>
        <span class="inset-label">Azores</span>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
